name: Test and Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  test:
    name: Test & Lint
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: latest

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Build frontend
        working-directory: frontend
        shell: bash
        run: |
          pnpm install
          pnpm nuxi generate
          rm -rf dist
          cp -r .output/public dist

      - name: Install FFmpeg
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Download dependencies
        run: go mod tidy && go mod download

      - name: Vet
        run: go vet ./...

      - name: Install golangci-lint
        run: |
          curl -sSfL https://raw.githubusercontent.com/golangci/golangci-lint/master/install.sh | sh -s -- -b $(go env GOPATH)/bin v2.11.4

      - name: Lint
        run: golangci-lint run --config .golangci.yml ./...

      - name: Test
        run: go test ./... -v -timeout 60s

  build:
    name: Build ${{ matrix.platform.name }}
    needs: test
    runs-on: ${{ matrix.platform.os }}
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    strategy:
      matrix:
        platform:
          - name: windows-amd64
            os: windows-latest
            ext: ".exe"
            wails-platform: windows/amd64
          - name: darwin-universal
            os: macos-latest
            ext: ""
            wails-platform: darwin/universal
          - name: linux-amd64
            os: ubuntu-latest
            ext: ""
            wails-platform: linux/amd64

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: latest

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libwebkit2gtk-4.1-dev

      - name: Build with Wails
        run: wails build -platform "${{ matrix.platform.wails-platform }}" -o "FFmpeg-Wails-${{ matrix.platform.name }}${{ matrix.platform.ext }}" -skipbindings

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: FFmpeg-Wails-${{ matrix.platform.name }}
          path: build/bin/FFmpeg-Wails-${{ matrix.platform.name }}${{ matrix.platform.ext }}

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/**/*
          generate_release_notes: true
          draft: false
          prerelease: false
