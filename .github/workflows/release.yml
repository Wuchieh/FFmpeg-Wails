name: Test and Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  test:
    name: Test & Lint
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: latest

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Build frontend (for go vet/lint embed)
        working-directory: frontend
        shell: bash
        run: |
          pnpm install
          pnpm generate

      - name: Install FFmpeg
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Download dependencies
        run: go mod tidy && go mod download

      - name: Vet
        run: go vet ./...

      - name: Install golangci-lint
        run: |
          curl -sSfL https://raw.githubusercontent.com/golangci/golangci-lint/master/install.sh | sh -s -- -b $(go env GOPATH)/bin v2.11.4

      - name: Lint
        run: golangci-lint run --config .golangci.yml ./...

      - name: Test
        run: go test ./... -v -timeout 60s

  build:
    name: Build ${{ matrix.platform.name }}
    needs: test
    runs-on: ${{ matrix.platform.os }}
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    strategy:
      matrix:
        platform:
          - name: windows-amd64
            os: windows-latest
            ext: ".exe"
            wails-platform: windows/amd64
          - name: darwin-universal
            os: macos-latest
            ext: ""
            wails-platform: darwin/universal
          - name: linux-amd64
            os: ubuntu-latest
            ext: ""
            wails-platform: linux/amd64

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: latest

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev

      - name: Build with Wails
        shell: bash
        run: |
          ARGS="-platform ${{ matrix.platform.wails-platform }} -skipbindings"
          if [ "$RUNNER_OS" = "Linux" ]; then
            ARGS="$ARGS -tags webkit2_41"
          fi
          wails build $ARGS

      - name: Rename and package output
        shell: bash
        run: |
          cd build/bin
          echo "=== Files in build/bin ==="
          ls -la
          if [ "$RUNNER_OS" = "macOS" ]; then
            APP_FILE=$(find . -name "*.app" -maxdepth 1 -type d | head -1)
            if [ -n "$APP_FILE" ]; then
              zip -r FFmpeg-Wails-darwin-universal.zip "$APP_FILE"
            else
              BINARY=$(find . -maxdepth 1 -type f ! -name ".*" | head -1)
              if [ -n "$BINARY" ]; then
                mv "$BINARY" FFmpeg-Wails-darwin-universal
              fi
            fi
          elif [ "$RUNNER_OS" = "Windows" ]; then
            EXE_FILE=$(find . -name "*.exe" -maxdepth 1 | head -1)
            if [ -n "$EXE_FILE" ] && [ "$EXE_FILE" != "./FFmpeg-Wails-windows-amd64.exe" ]; then
              mv "$EXE_FILE" FFmpeg-Wails-windows-amd64.exe
            fi
          elif [ "$RUNNER_OS" = "Linux" ]; then
            BINARY=$(find . -maxdepth 1 -type f -executable ! -name ".*" | head -1)
            if [ -n "$BINARY" ] && [ "$BINARY" != "./FFmpeg-Wails-linux-amd64" ]; then
              mv "$BINARY" FFmpeg-Wails-linux-amd64
            fi
          fi
          echo "=== After rename ==="
          ls -la

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: FFmpeg-Wails-${{ matrix.platform.name }}
          path: build/bin/FFmpeg-Wails-*

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/**/*
          generate_release_notes: true
          draft: false
          prerelease: false
